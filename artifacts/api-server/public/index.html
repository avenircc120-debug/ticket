<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Créer un ticket GitHub</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f6f8fa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: #ffffff;
      border: 1px solid #d0d7de;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 540px;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
    }

    .header {
      display: flex;
      align-items: center;
      gap: .75rem;
      margin-bottom: 1.75rem;
    }

    .header svg { color: #1f883d; flex-shrink: 0; }

    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      color: #1f2328;
    }

    .repo-badge {
      display: inline-block;
      font-size: .75rem;
      background: #ddf4ff;
      color: #0969da;
      border: 1px solid #b6e3ff;
      border-radius: 20px;
      padding: .15rem .6rem;
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: .875rem;
      font-weight: 600;
      color: #1f2328;
      margin-bottom: .375rem;
    }

    .field { margin-bottom: 1.25rem; }

    input[type="text"], textarea, select {
      width: 100%;
      padding: .5rem .75rem;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      font-size: .875rem;
      color: #1f2328;
      background: #f6f8fa;
      transition: border-color .15s, box-shadow .15s;
      font-family: inherit;
    }

    input[type="text"]:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #0969da;
      box-shadow: 0 0 0 3px rgba(9,105,218,.1);
      background: #fff;
    }

    input.invalid {
      border-color: #d1242f !important;
      box-shadow: 0 0 0 3px rgba(209,36,47,.1) !important;
    }

    input.valid {
      border-color: #1f883d !important;
      box-shadow: 0 0 0 3px rgba(31,136,61,.1) !important;
    }

    .field-error {
      font-size: .75rem;
      color: #d1242f;
      margin-top: .3rem;
      display: none;
    }

    .field-error.visible { display: block; }

    textarea { resize: vertical; min-height: 120px; }

    .hint {
      font-size: .75rem;
      color: #656d76;
      margin-top: .3rem;
    }

    button[type="submit"] {
      width: 100%;
      padding: .6rem 1.25rem;
      background: #1f883d;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
    }

    button[type="submit"]:hover:not(:disabled) { background: #1a7f37; }
    button[type="submit"]:disabled { opacity: .6; cursor: not-allowed; }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }
    .loading .spinner { display: block; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .alert {
      border-radius: 8px;
      padding: .75rem 1rem;
      font-size: .875rem;
      margin-top: 1.25rem;
      display: none;
    }

    .alert.success {
      background: #dafbe1;
      border: 1px solid #aceebb;
      color: #116329;
      display: block;
    }

    .alert.error {
      background: #ffebe9;
      border: 1px solid #ffcecb;
      color: #82071e;
      display: block;
    }

    .alert a {
      color: inherit;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <h1>Nouveau ticket GitHub</h1>
    </div>

    <span class="repo-badge">avenircc120-debug/ticket</span>

    <form id="ticketForm">
      <div class="field">
        <label for="username">Nom d'utilisateur <span style="color:#d1242f">*</span></label>
        <input type="text" id="username" name="username" placeholder="ex: 5jean" maxlength="5" required autocomplete="off" />
        <p class="hint">5 caractères : commence par un chiffre, suivi de 4 lettres (ex: <strong>3marc</strong>, <strong>7anna</strong>)</p>
        <p class="field-error" id="usernameError">Format invalide — doit commencer par un chiffre puis 4 lettres uniquement.</p>
      </div>

      <div class="field">
        <label for="title">Titre <span style="color:#d1242f">*</span></label>
        <input type="text" id="title" name="title" placeholder="Décrivez le problème en quelques mots" required />
      </div>

      <div class="field">
        <label for="label">Étiquette (optionnel)</label>
        <select id="label" name="label">
          <option value="">— Aucune —</option>
          <option value="bug">🐛 Bug</option>
          <option value="enhancement">✨ Amélioration</option>
          <option value="question">❓ Question</option>
          <option value="documentation">📝 Documentation</option>
        </select>
      </div>

      <div class="field">
        <label for="body">Description</label>
        <textarea id="body" name="body" placeholder="Décrivez le problème en détail, les étapes pour le reproduire, ce que vous attendiez…"></textarea>
        <p class="hint">Vous pouvez utiliser le format Markdown.</p>
      </div>

      <button type="submit" id="submitBtn">
        <div class="spinner" id="spinner"></div>
        <span id="btnText">Envoyer le ticket</span>
      </button>

      <div class="alert" id="alertBox"></div>
    </form>
  </div>

  <script>
    const form = document.getElementById('ticketForm');
    const btn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');
    const alertBox = document.getElementById('alertBox');
    const usernameInput = document.getElementById('username');
    const usernameError = document.getElementById('usernameError');

    const USERNAME_REGEX = /^[0-9][a-zA-Z]{4}$/;

    function validateUsername(value) {
      return USERNAME_REGEX.test(value);
    }

    usernameInput.addEventListener('input', () => {
      const val = usernameInput.value;
      if (val.length === 0) {
        usernameInput.classList.remove('valid', 'invalid');
        usernameError.classList.remove('visible');
      } else if (validateUsername(val)) {
        usernameInput.classList.add('valid');
        usernameInput.classList.remove('invalid');
        usernameError.classList.remove('visible');
      } else {
        usernameInput.classList.add('invalid');
        usernameInput.classList.remove('valid');
        usernameError.classList.add('visible');
      }
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      alertBox.className = 'alert';
      alertBox.textContent = '';

      const username = usernameInput.value.trim();
      const title = document.getElementById('title').value.trim();
      const body = document.getElementById('body').value.trim();
      const label = document.getElementById('label').value;

      if (!validateUsername(username)) {
        usernameInput.classList.add('invalid');
        usernameInput.classList.remove('valid');
        usernameError.classList.add('visible');
        usernameInput.focus();
        return;
      }

      btn.disabled = true;
      btn.classList.add('loading');
      btnText.textContent = 'Envoi en cours…';

      try {
        const res = await fetch('/api/github/issues', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, body: `**Soumis par :** ${username}\n\n${body}`, label }),
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || 'Erreur inconnue');
        }

        alertBox.className = 'alert success';
        alertBox.innerHTML = `✅ Ticket <strong>#${data.id}</strong> créé avec succès ! <a href="${data.url}" target="_blank">Voir sur GitHub →</a>`;
        form.reset();
        usernameInput.classList.remove('valid', 'invalid');
      } catch (err) {
        alertBox.className = 'alert error';
        alertBox.textContent = '❌ ' + (err.message || 'Échec de la connexion. Vérifiez votre token GitHub.');
      } finally {
        btn.disabled = false;
        btn.classList.remove('loading');
        btnText.textContent = 'Envoyer le ticket';
      }
    });
  </script>
</body>
</html>
