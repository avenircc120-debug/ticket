<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ticket WiFi</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.6rem;
      padding: 2rem;
    }

    h1 {
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: #94a3b8;
    }

    .fields { display: flex; flex-direction: column; gap: 1rem; width: 100%; max-width: 320px; }

    .field-wrap { display: flex; flex-direction: column; align-items: center; gap: .4rem; }

    .field-wrap label {
      font-size: .75rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #64748b;
    }

    .field-wrap input {
      width: 100%;
      text-align: center;
      font-size: 1.9rem;
      font-weight: 700;
      letter-spacing: .2em;
      text-transform: uppercase;
      background: #1e293b;
      border: 2px solid #334155;
      border-radius: 12px;
      color: #f8fafc;
      padding: .7rem 1rem;
      outline: none;
      transition: border-color .15s;
    }

    .field-wrap input:focus   { border-color: #3b82f6; }
    .field-wrap input.valid   { border-color: #22c55e; }
    .field-wrap input.invalid { border-color: #f87171; }

    .field-hint  { font-size: .72rem; color: #64748b; text-align: center; }
    .field-error { font-size: .72rem; color: #f87171; text-align: center; display: none; }

    /* ── Ticket ── */
    #ticket-display {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: .6rem;
      background: #1e293b;
      border: 2px solid #22c55e;
      border-radius: 16px;
      padding: 1.5rem 2rem;
      width: 100%;
      max-width: 320px;
      text-align: center;
    }
    #ticket-display.visible { display: flex; }

    .t-lbl {
      font-size: .72rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #64748b;
    }

    #ticket-id {
      font-size: 3.2rem;
      font-weight: 900;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: #f8fafc;
      line-height: 1;
    }

    #ticket-pin {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: .25em;
      color: #94a3b8;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: #334155;
      margin: .25rem 0;
    }

    .wifi-section { display: none; flex-direction: column; align-items: center; gap: .3rem; width: 100%; }
    .wifi-section.visible { display: flex; }

    .wifi-lbl { font-size: .7rem; letter-spacing: .12em; text-transform: uppercase; color: #64748b; }

    #wifi-code {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: .12em;
      color: #3b82f6;
      word-break: break-all;
    }

    #wifi-loading { font-size: .8rem; color: #64748b; display: none; }

    /* ── Statut ── */
    #status { font-size: .8rem; color: #22c55e; min-height: 1.1rem; text-align: center; }
    #status.error { color: #f87171; }

    /* ── Bouton ── */
    #generate-btn {
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 16px;
      padding: 1.1rem 3rem;
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background .15s, transform .1s;
      box-shadow: 0 4px 24px rgba(59,130,246,.35);
      width: 100%;
      max-width: 320px;
    }
    #generate-btn:hover   { background: #2563eb; }
    #generate-btn:active  { transform: scale(.97); }
    #generate-btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }
  </style>
</head>
<body>

  <h1>Ticket WiFi — ze.lan</h1>

  <div class="fields">
    <div class="field-wrap">
      <label for="username">Identifiant</label>
      <input id="username" type="text" maxlength="5"
             placeholder="5BJNX" autocomplete="off" autocapitalize="characters" />
      <p class="field-hint">1 chiffre + 4 lettres &nbsp;·&nbsp; ex : <strong>5BJNX</strong></p>
      <p class="field-error" id="err-username">Chiffre au début + 4 lettres uniquement.</p>
    </div>

    <div class="field-wrap">
      <label for="pincode">Code 4 chiffres</label>
      <input id="pincode" type="text" maxlength="4" inputmode="numeric"
             placeholder="5235" autocomplete="off" />
      <p class="field-hint">4 chiffres &nbsp;·&nbsp; ex : <strong>5235</strong></p>
      <p class="field-error" id="err-pin">Doit contenir exactement 4 chiffres.</p>
    </div>
  </div>

  <div id="ticket-display">
    <span class="t-lbl">Votre ticket</span>
    <span id="ticket-id"></span>
    <span id="ticket-pin"></span>

    <div class="divider"></div>

    <div class="wifi-section" id="wifi-section">
      <span class="wifi-lbl">🔐 Code WiFi ze.lan</span>
      <span id="wifi-code"></span>
    </div>
    <span id="wifi-loading">Récupération du code WiFi…</span>
  </div>

  <p id="status"></p>

  <button id="generate-btn" onclick="f()">GÉNÉRER TICKET</button>

  <script>
    const API_ISSUES = 'https://ticket-tau-seven.vercel.app/api/github/issues';
    const API_WIFI   = 'https://ticket-tau-seven.vercel.app/api/wifi/codes';
    const ID_RE      = /^[0-9][a-zA-Z]{4}$/;
    const PIN_RE     = /^[0-9]{4}$/;

    const usernameEl  = document.getElementById('username');
    const pincodeEl   = document.getElementById('pincode');
    const errUsername = document.getElementById('err-username');
    const errPin      = document.getElementById('err-pin');
    const displayEl   = document.getElementById('ticket-display');
    const ticketId    = document.getElementById('ticket-id');
    const ticketPin   = document.getElementById('ticket-pin');
    const wifiSection = document.getElementById('wifi-section');
    const wifiCode    = document.getElementById('wifi-code');
    const wifiLoading = document.getElementById('wifi-loading');
    const statusEl    = document.getElementById('status');
    const btn         = document.getElementById('generate-btn');

    function validate(input, regex, errEl) {
      const v = input.value;
      if (!v) { input.className=''; errEl.style.display='none'; return false; }
      if (regex.test(v)) { input.className='valid'; errEl.style.display='none'; return true; }
      input.className='invalid'; errEl.style.display='block'; return false;
    }

    usernameEl.addEventListener('input', () => validate(usernameEl, ID_RE, errUsername));
    pincodeEl.addEventListener('input', () => {
      pincodeEl.value = pincodeEl.value.replace(/\D/g,'');
      validate(pincodeEl, PIN_RE, errPin);
    });

    async function f() {
      const user = usernameEl.value.trim();
      const pin  = pincodeEl.value.trim();

      if (!validate(usernameEl, ID_RE, errUsername)) { usernameEl.focus(); return; }
      if (!validate(pincodeEl,  PIN_RE, errPin))     { pincodeEl.focus();  return; }

      ticketId.textContent  = user.toUpperCase();
      ticketPin.textContent = pin;
      displayEl.classList.add('visible');
      wifiSection.classList.remove('visible');
      wifiCode.textContent  = '';
      wifiLoading.style.display = 'block';
      statusEl.className    = '';
      statusEl.textContent  = 'Enregistrement…';
      btn.disabled          = true;

      /* Appels en parallèle : ticket GitHub + code WiFi */
      const [issueRes, wifiRes] = await Promise.allSettled([
        fetch(API_ISSUES, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            title: 'Ticket ' + user.toUpperCase() + ' – ' + pin,
            body:  '**Identifiant :** `' + user.toUpperCase() + '`\n**Code :** `' + pin + '`',
            label: '',
          }),
        }).then(r => r.json()),

        fetch(API_WIFI).then(r => r.json()),
      ]);

      wifiLoading.style.display = 'none';

      if (issueRes.status === 'fulfilled' && issueRes.value.id) {
        statusEl.textContent = '✅ Ticket #' + issueRes.value.id + ' enregistré';
      } else {
        statusEl.className = 'error';
        statusEl.textContent = '❌ Erreur enregistrement ticket';
      }

      if (wifiRes.status === 'fulfilled' && wifiRes.value.code) {
        wifiCode.textContent = wifiRes.value.code;
        wifiSection.classList.add('visible');
      } else {
        wifiCode.textContent = wifiRes.value?.error || 'Aucun code disponible';
        wifiSection.classList.add('visible');
      }

      btn.disabled = false;
    }
  </script>
</body>
</html>
