<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ticket</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2.5rem;
      padding: 2rem;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 500;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: #94a3b8;
    }

    #ticket-display {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .75rem;
      min-height: 130px;
      justify-content: center;
    }

    #ticket-code {
      font-size: 5.5rem;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #f8fafc;
      line-height: 1;
      display: none;
    }

    #ticket-code.visible { display: block; }

    #ticket-label {
      font-size: .85rem;
      color: #64748b;
      letter-spacing: .08em;
      text-transform: uppercase;
      display: none;
    }

    #ticket-label.visible { display: block; }

    #status {
      font-size: .8rem;
      color: #22c55e;
      min-height: 1.2rem;
      letter-spacing: .04em;
    }

    #status.error { color: #f87171; }

    #generate-btn {
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 16px;
      padding: 1.25rem 3.5rem;
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background .15s, transform .1s, box-shadow .15s;
      box-shadow: 0 4px 24px rgba(59,130,246,.35);
    }

    #generate-btn:active { transform: scale(.97); }
    #generate-btn:hover  { background: #2563eb; box-shadow: 0 6px 32px rgba(59,130,246,.5); }
    #generate-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    #history {
      display: flex;
      flex-wrap: wrap;
      gap: .5rem;
      justify-content: center;
      max-width: 380px;
    }

    .history-chip {
      background: #1e293b;
      color: #94a3b8;
      border-radius: 8px;
      padding: .3rem .75rem;
      font-size: .8rem;
      letter-spacing: .06em;
      font-weight: 600;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <h1>Générateur de ticket</h1>

  <div id="ticket-display">
    <span id="ticket-label">Votre ticket</span>
    <span id="ticket-code"></span>
  </div>

  <p id="status"></p>

  <button id="generate-btn" onclick="f()">GÉNÉRER TICKET</button>

  <div id="history"></div>

  <script>
    const API_URL = 'https://ticket-tau-seven.vercel.app/api/github/issues';

    function f() {
      const digits  = '0123456789';
      const letters = 'abcdefghijklmnopqrstuvwxyz';
      const code =
        digits[Math.floor(Math.random() * digits.length)] +
        Array.from({ length: 4 }, () => letters[Math.floor(Math.random() * letters.length)]).join('');

      const btn = document.getElementById('generate-btn');
      const codeEl = document.getElementById('ticket-code');
      const labelEl = document.getElementById('ticket-label');
      const statusEl = document.getElementById('status');
      const historyEl = document.getElementById('history');

      codeEl.textContent = code.toUpperCase();
      codeEl.classList.add('visible');
      labelEl.classList.add('visible');
      statusEl.className = '';
      statusEl.textContent = 'Enregistrement en cours…';
      btn.disabled = true;

      fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          title: 'Ticket ' + code.toUpperCase(),
          body: '**Code généré :** `' + code.toUpperCase() + '`',
          label: '',
        }),
      })
      .then(r => r.json())
      .then(data => {
        if (data.id) {
          statusEl.className = '';
          statusEl.textContent = '✅ Ticket #' + data.id + ' enregistré';
          const chip = document.createElement('span');
          chip.className = 'history-chip';
          chip.textContent = code.toUpperCase();
          historyEl.prepend(chip);
        } else {
          throw new Error(data.error || 'Erreur');
        }
      })
      .catch(err => {
        statusEl.className = 'error';
        statusEl.textContent = '❌ ' + err.message;
      })
      .finally(() => {
        btn.disabled = false;
      });
    }
  </script>
</body>
</html>
